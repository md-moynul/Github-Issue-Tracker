<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- goggle font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./style/style.css">

<body>
    <header class="px-20 py-4 shadow flex justify-between">
        <div class="flex gap-1">
            <div class="w-8">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>
        <div>
            <div class=" flex space-x-4">
                <div>
                    <label class="input validator join-item">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="text" placeholder="search" required />
                    </label>
                </div>
                <button class="btn btn-primary join-item">Search</button>
            </div>
        </div>
    </header>
    <main class="py-20 bg-base-200 ">
        <section class="w-9/12 mx-auto shadow">
            <div class="flex p-6 gap-2 bg-base-100 shadow mb-4 items-center">
                <button id="allBtn" class="btn btn-primary w-30">All</button>
                <button id="openBtn" class="btn bg-base-100 w-30">Open</button>
                <button id="closeBtn" class="btn bg-base-100 w-30">Close</button>
            </div>
            <div class="flex justify-between p-6  bg-base-100 shadow ">
                <div class="flex gap-2 items-center">
                    <div class=" w-12 h-12 bg-primary/20 rounded-full p-2 flex justify-center items-center">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="font-bold text-xl">
                            <span id="total">50 </span>
                            Issues
                        </h2>
                        <p class="text-gray text-[16px]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <p class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#00A96E] block"></span>Open
                    </p>
                    <p class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-primary block"></span>Close
                    </p>
                </div>
            </div>
            <section>
                <div id="cardContiner" class="p-6 grid grid-cols-4 gap-3">
                    <div class="bg-base-100 rounded-xl  border-t-[3px] border-t-green-500 shadow ">
                        <div class="p-4 shadow space-y-3">
                            <div class="flex justify-between">
                                <div>
                                    <img src="./assets/Open-Status.png" alt="">
                                </div>
                                <p>High</p>
                            </div>
                            <div class="space-y-2">
                                <h2 class="font-semibold text-[14px]">Fix navigation menu on mobile devices</h2>
                                <p class="line-clamp-2 text-xs text-gray ">The navigation menu doesn't collapse properly on mobile devices...</p>
                            </div>
                            <div class="flex gap-1">
                                <span class="bg-red-100 py-1.5 px-2 rounded-xl font-medium text-red-500">Bug</span>
                                <span class="bg-red-100 py-1.5 px-2 rounded-xl font-medium text-red-500">help
                                    wanted</span>
                            </div>

                        </div>
                        <div class="p-4 space-y-2">
                            <p class="text-xs text-gray ">#1by john_doe</p>
                            <p class="text-xs text-gray ">1/15/2024</p>
                        </div>
                    </div>



                </div>
            </section>
        </section>
    </main>



    <script src="./script/home.js"></script>
</body>
</html>
