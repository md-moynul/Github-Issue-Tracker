<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- goggle font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./style/style.css">

<body>
    <header class="px-20 py-4 shadow flex justify-between">
        <div class="flex gap-1">
            <div class="w-8">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>
        <div>
            <div class=" flex space-x-4">
                <div>
                    <label class="input validator join-item">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="text" placeholder="search" required />
                    </label>
                </div>
                <button class="btn btn-primary join-item">Search</button>
            </div>
        </div>
    </header>
    <main class="py-20 bg-base-200 ">
        <section class="w-9/12 mx-auto shadow">
            <div class="flex p-6 gap-2 bg-base-100 shadow mb-4 items-center">
                <button onclick="toggle('allBtn')" id="allBtn" class="btn btn-primary lg:w-30">All</button>
                <button onclick="toggle('openBtn')" id="openBtn" class="btn bg-base-100 lg:w-30">Open</button>
                <button onclick="toggle('closeBtn')" id="closeBtn" class="btn bg-base-100 lg:w-30">Close</button>
            </div>
            <div class="flex justify-between p-6  bg-base-100 shadow ">
                <div class="flex gap-2 items-center">
                    <div class=" w-12 h-12 bg-primary/20 rounded-full p-2 flex justify-center items-center">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="font-bold text-xl">
                            <span id="total">50 </span>
                            Issues
                        </h2>
                        <p class="text-gray text-[16px]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <p class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-[#00A96E] block"></span>Open
                    </p>
                    <p class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-primary block"></span>Close
                    </p>
                </div>
            </div>
            <section>
                <div id="cardContainer" class="p-6 grid grid-cols-4 gap-3">
                </div>
                <!-- spinner -->
                <div id="spinner" class="h-[60vh] flex justify-center items-center hidden">
                    <span class="loading loading-spinner loading-lg"></span>
                </div>

            </section>
            <div>
                <dialog id="boxModal" class="modal modal-bottom sm:modal-middle">
                    <div class="modal-box space-y-6">
                        <form method="dialog">
                            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
                        </form>
                        <div class="space-y-6">
                            <h3 id="modalTittle" class="text-2xl font-bold"></h3>
                            <div class="flex items-center space-x-2">
                                <p id="modalStatus" class="p-1 text-xs text-white  rounded-full">
                                    Opened
                                </p>
                                <span class="w-1 h-1 bg-[#64748B] rounded-full"></span>
                                <p>
                                    Opened by <span id="modalName"></span>
                                </p>
                                <span class="w-1 h-1 bg-[#64748B] rounded-full"></span>
                                <p id="modalDate">
                                    22/02/2026
                                </p>
                            </div>
                            <p id="modalDes" class="line-clamp-2 text-xs text-gray "></p>
                            <div class="flex">
                                <div class="w-[50%] space-y-2.5">
                                    <p class="text-gray ">
                                        Assignee:  
                                    </p>
                                    <p id="modalNameB" class="font-semibold">
                                        Fahim Ahmed
                                    </p>
                                </div>
                                <div class="space-y-2.5">
                                    <p class="text-gray ">
                                        Priority:
                                    </p>
                                    <p id="modalPriority" class="bg-red-500 text-white px-4 py-1.25 rounded-full ">
                                        High
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div class="modal-action">
                            <form method="dialog">
                                <button class="btn">Close</button>
                            </form>
                        </div>
                    </div>
                </dialog>
            </div>
        </section>
    </main>



    <script src="./script/home.js"></script>
</body>

</html>
