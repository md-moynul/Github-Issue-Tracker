<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker | login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- goggle font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="min-h-screen bg-base-200 py-7">
    <main class=" max-w-md mx-auto bg-base-100 p-8 space-y-6">
        <div class="space-y-5">
            <div>
                <img class="mx-auto" src="./assets/github-logo.png" alt="">
            </div>
            <div class=" text-center space-y-1">
                <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
                <p class="text-[16px] text-gray">Sign in to manage your issues</p>
            </div>
            <fieldset class="fieldset space-y-3">
                <div class="space-y-1">
                    <label class="label text-black font-semibold text-[16px] ">Username</label>
                    <input id="inputUsername" type="text" class="input w-full text-gray text-[16px]" placeholder="Enter Username" />
                    <p class="text-primary">Default: admin</p>
                </div>
                <div class="space-y-1">
                    <label class="label text-black font-semibold text-[16px] ">Password</label>
                    <input id="inputPassword" type="password" class="input w-full text-gray text-[16px]" placeholder="Password" />
                    <p class="text-primary">Default: admin123</p>
                </div>
                <button id="btnLogin" class="btn btn-primary mt-4">Login</button>
            </fieldset>
            <div>
                <p class="text-center">OR</p>
                <p class="text-center text-gray">Demo Credentials:</p>
            </div>

            <div class="text-center bg-base-200 py-4 rounded-xl">
                <p><span class="font-semibold">Username: </span>admin</p>
                <p><span class="font-semibold">Password: </span>admin123</p>
            </div>
    </main>

    <script src="./script/login.js"></script>
</body>

</html>
